<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TradingBot Pulse</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="pulse-status" aria-label="System status">
      <div class="status-item">
        <span>Feed</span>
        <strong id="status-feed">n/a</strong>
      </div>
      <div class="status-item">
        <span>Execution</span>
        <strong id="status-execution">PAPER</strong>
      </div>
      <div class="status-item">
        <span>Bots</span>
        <strong id="status-bots">0/0</strong>
      </div>
      <div class="status-item">
        <span>Positions</span>
        <strong id="status-positions">0</strong>
      </div>
      <div class="status-item pnl-status">
        <span>Net PnL</span>
        <strong id="status-pnl">$0.00</strong>
      </div>
      <div class="status-item kill-status" id="status-kill-shell">
        <span>Kill switch</span>
        <strong id="status-kill">n/a</strong>
      </div>
      <div class="status-item">
        <span>Market stream</span>
        <strong id="status-stream">n/a</strong>
      </div>
      <div class="status-item">
        <span>Last tick</span>
        <strong id="status-tick-age">n/a</strong>
      </div>
    </header>

    <main class="pulse-shell">
      <section class="bot-column" aria-label="Bots">
        <div class="section-heading">
          <div>
            <p>Pulse</p>
            <h1>Bot state</h1>
          </div>
          <span id="refresh-status">Waiting for data...</span>
        </div>
        <div class="bot-cards" id="bot-cards"></div>
      </section>

      <aside class="focus-panel" aria-label="Selected bot">
        <div class="focus-heading">
          <div>
            <p id="focus-symbol-note">Select a bot</p>
            <h2 id="focus-title">No bot selected</h2>
            <span id="focus-architect">warming up...</span>
          </div>
          <div class="focus-actions">
            <button id="resume-button" type="button" class="is-hidden">Resume</button>
            <button id="history-button" type="button">History</button>
          </div>
        </div>

        <section class="position-block" aria-label="Position details">
          <h3>Position</h3>
          <div class="position-grid" id="position-details"></div>
        </section>

        <section class="events-block" aria-label="Recent bot events">
          <h3>Recent events</h3>
          <div id="focus-events" class="event-list"></div>
        </section>
      </aside>
    </main>

    <dialog id="history-dialog" class="history-dialog">
      <header>
        <div>
          <p>History</p>
          <h2 id="history-title">Closed positions</h2>
        </div>
        <button id="history-close" type="button">Close</button>
      </header>
      <div id="history-list" class="history-list"></div>
    </dialog>
    <script src="/pulse.js"></script>
  </body>
</html>
